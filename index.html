<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自我探索 v1.5</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#1d1d1f;
  --text2:#86868b;
  --accent:#5e5ce6;
  --accent2:#7c7af0;
  --accent-light:#eeedff;
  --border:#e5e5ea;
  --radius:20px;
  --shadow:0 2px 16px rgba(0,0,0,0.06);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1e;
    --card:#2c2c30;
    --text:#f5f5f7;
    --text2:#8e8e93;
    --accent:#7c7af0;
    --accent-light:#2c2c50;
    --border:#3a3a3e;
    --shadow:0 2px 16px rgba(0,0,0,0.3);
  }
}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
#app{
  width:100%;max-width:440px;padding:32px 24px;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  transition:background .4s;
}

/* ===== Screens ===== */
.screen{display:none;flex-direction:column;align-items:center;width:100%;}
.screen.active{display:flex;}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.scale-in{animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ===== IDLE ===== */
.header{
  position:absolute;top:32px;left:24px;right:24px;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.greeting{font-size:22px;font-weight:600;letter-spacing:-.3px;}
.scene-badge{
  display:inline-block;margin-top:4px;
  font-size:14px;color:var(--text2);
  background:var(--card);padding:4px 12px;border-radius:20px;
  box-shadow:var(--shadow);
}
.settings-btn{
  background:none;border:none;color:var(--text2);font-size:22px;
  cursor:pointer;padding:4px;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;
}
.settings-btn:hover{background:var(--border);color:var(--text);}
.count-text{margin-top:16px;font-size:15px;color:var(--text2);}

.start-btn-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;padding:0 0 60px;
}
.start-btn{
  width:220px;height:220px;border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:20px;font-weight:600;letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 8px 40px rgba(94,92,230,.35);
  transition:transform .2s,box-shadow .2s;
  position:relative;
}
.start-btn::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid var(--accent);opacity:.3;
  animation:pulse-ring 2.5s ease-in-out infinite;
}
@keyframes pulse-ring{
  0%,100%{transform:scale(1);opacity:.3}
  50%{transform:scale(1.06);opacity:.1}
}
.start-btn:active{transform:scale(.95);box-shadow:0 4px 20px rgba(94,92,230,.3);}
.prep-btn:active{transform:scale(.95);box-shadow:0 4px 20px rgba(94,92,230,.3);}
.start-btn .sub{display:block;font-size:13px;font-weight:400;opacity:.8;margin-top:4px;}

/* ===== ROLLING ===== */
#rolling-screen{cursor:pointer;}
#rolling-screen .action-roller{height:80px;overflow:hidden;text-align:center;}
#rolling-screen .action-roller .item{
  font-size:26px;font-weight:600;line-height:80px;height:80px;
  color:var(--accent);
  animation:roll .08s steps(1) infinite;
}

/* ===== ACTIVE ===== */
.timer-card{
  text-align:center;
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;
}
.timer-ring-wrap{position:relative;margin-bottom:16px;}
.timer-ring{
  width:240px;height:240px;border-radius:50%;
  background:conic-gradient(var(--accent) 0deg 360deg,var(--border) 360deg);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:background .3s linear;
}
.timer-ring-inner{
  width:210px;height:210px;border-radius:50%;
  background:var(--card);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.04);
}
.action-label{font-size:15px;color:var(--text2);margin-bottom:4px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timer-digits{font-size:56px;font-weight:700;letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1;color:var(--text);}
.timer-unit{font-size:16px;font-weight:400;color:var(--text2);margin-top:4px;}
.hint{font-size:14px;color:var(--text2);margin-top:20px;}

.active-controls{width:100%;display:flex;justify-content:center;gap:12px;padding:20px 0 32px;}
.btn-ghost{
  background:var(--card);border:1px solid var(--border);color:var(--text2);
  padding:10px 20px;border-radius:40px;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-ghost:hover{background:var(--border);color:var(--text);}
.btn-ghost:active{transform:scale(.97);}

/* ===== DONE ===== */
.done-icon{font-size:48px;margin-bottom:8px;animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1);}
.done-title{font-size:22px;font-weight:600;margin-bottom:4px;}
.done-action-name{font-size:18px;color:var(--accent);font-weight:500;margin-bottom:32px;}
.done-buttons{width:100%;display:flex;flex-direction:column;gap:12px;padding:0 0 40px;}
.btn-primary{
  width:100%;padding:16px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:17px;font-weight:600;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{
  width:100%;padding:16px;border:1.5px solid var(--border);border-radius:var(--radius);
  background:transparent;color:var(--text);font-size:17px;font-weight:500;cursor:pointer;
  transition:background .15s,transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-secondary:active{transform:scale(.97);background:var(--border);}

/* ===== SETTINGS MODAL ===== */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:100;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;}
.overlay.open .modal{animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{
  width:100%;max-width:440px;max-height:80vh;
  background:var(--card);border-radius:20px 20px 0 0;
  padding:24px;overflow-y:auto;
  box-shadow:0 -4px 30px rgba(0,0,0,.1);
}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:600;}
.modal-close{
  background:none;border:none;color:var(--text2);font-size:22px;
  cursor:pointer;padding:4px;
}
.modal-close:hover{color:var(--text);}
.action-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.action-item:last-child{border-bottom:none;}
.action-item-name{font-size:15px;font-weight:500;}
.action-item-tags{display:flex;gap:6px;margin-top:4px;}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-light);color:var(--accent);}
.prep-tag{background:#fff2e0;color:#e68a00;}
@media(prefers-color-scheme:dark){.prep-tag{background:#3a2a10;color:#f5a623;}}
.action-item-del{
  background:none;border:none;color:#ff3b30;font-size:18px;
  cursor:pointer;padding:4px 8px;border-radius:8px;
  transition:background .2s;
}
.action-item-del:hover{background:rgba(255,59,48,.1);}
.add-form{display:flex;gap:8px;margin-top:16px;}
.add-form input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:15px;outline:none;background:var(--bg);color:var(--text);
}
.add-form input:focus{border-color:var(--accent);}
.add-form button{
  padding:10px 18px;border:none;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:background .2s;
}
.add-form button:hover{background:var(--accent2);}
.add-form button:active{transform:scale(.97);}

.scene-toggle-group{display:flex;gap:12px;margin:12px 0;}
.toggle-btn{
  padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.toggle-btn.active{
  background:var(--accent-light);border-color:var(--accent);color:var(--accent);
}
.duration-picker{display:flex;align-items:center;gap:10px;margin-top:14px;}
.duration-label{font-size:13px;color:var(--text2);white-space:nowrap;}
.duration-options{display:flex;gap:6px;flex-wrap:wrap;}
.dur-btn{
  padding:6px 12px;border-radius:16px;border:1.5px solid var(--border);
  background:transparent;color:var(--text2);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.dur-btn.active{
  background:var(--accent-light);border-color:var(--accent);color:var(--accent);
}
.dur-btn:hover{border-color:var(--accent);color:var(--text);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;}
.toggle-row-label{font-size:14px;font-weight:500;color:var(--text);}
.switch{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch-slider{
  position:absolute;cursor:pointer;inset:0;
  background:var(--border);border-radius:26px;
  transition:background .2s;
}
.switch-slider::before{
  content:'';position:absolute;height:20px;width:20px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;
  transition:transform .2s;
}
.switch input:checked + .switch-slider{background:var(--accent);}
.switch input:checked + .switch-slider::before{transform:translateX(18px);}

/* ===== Footer ===== */
.footer{position:absolute;bottom:24px;left:24px;right:24px;text-align:center;font-size:12px;color:var(--text2);}
.footer a{color:var(--text2);text-decoration:none;opacity:.5;transition:opacity .2s;}
.footer a:hover{opacity:1;}

/* ===== Responsive ===== */
@media(min-width:600px){
  #app{min-height:100vh;padding:48px 32px;}
  .start-btn{width:240px;height:240px;font-size:22px;}
  .timer-ring{width:260px;height:260px;}
  .timer-ring-inner{width:228px;height:228px;}
  .timer-digits{font-size:64px;}
}
</style>
</head>
<body>

<div id="app">

  <!-- ===== IDLE ===== -->
  <div id="idle-screen" class="screen active">
    <div class="header">
      <div>
        <div class="greeting" id="greeting">早上好</div>
        <div class="scene-badge" id="sceneBadge">🏢 在公司 · <span id="actionCount">12</span> 个行动</div>
      </div>
      <button class="settings-btn" id="settingsBtn" aria-label="管理">⚙️</button>
    </div>
    <div class="start-btn-wrap">
      <button class="start-btn" id="startBtn">
        开始做点什么
        <span class="sub">随便点一下就好</span>
      </button>
    </div>
  </div>

  <!-- ===== ROLLING ===== -->
  <div id="rolling-screen" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div style="font-size:15px;color:var(--text2);margin-bottom:16px;">给你选一个…</div>
      <div class="action-roller" id="actionRoller">
        <div class="item">读一页书</div>
      </div>
      <div id="rollHint" style="font-size:13px;color:var(--text2);margin-top:24px;opacity:0;">点一下屏幕停止</div>
    </div>
  </div>

  <!-- ===== PREP ===== -->
  <div id="prep-screen" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;text-align:center;">
      <div style="font-size:15px;color:var(--text2);margin-bottom:12px;">接下来做这个</div>
      <div class="prep-action-name" id="prepActionName" style="font-size:28px;font-weight:700;margin-bottom:8px;color:var(--accent);">读一页书</div>
      <div class="prep-duration" id="prepDuration" style="font-size:14px;color:var(--text2);margin-bottom:40px;">共 5 分钟</div>
      <button class="prep-btn" id="prepStartBtn" style="width:200px;height:200px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 8px 40px rgba(94,92,230,.35);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;letter-spacing:1px;">
        准备好了
        <span style="display:block;font-size:13px;font-weight:400;opacity:.8;margin-top:4px;">点一下开始计时</span>
      </button>
      <div style="margin-top:24px;"><button class="btn-ghost" id="prepCancelBtn">换一个</button></div>
    </div>
  </div>

  <!-- ===== ACTIVE ===== -->
  <div id="active-screen" class="screen">
    <div class="header" style="position:relative;top:0;left:0;right:0;padding:0;">
      <button class="btn-ghost" id="exitActiveBtn">✕ 退出</button>
    </div>
    <div class="timer-card fade-in">
      <div class="timer-ring-wrap">
        <div class="timer-ring" id="timerRing">
          <div class="timer-ring-inner">
            <div class="action-label" id="activeActionLabel">读一页书</div>
            <div class="timer-digits" id="timerDigits">5:00</div>
            <div class="timer-unit" id="timerUnit">共 5 分钟</div>
          </div>
        </div>
      </div>
      <div class="hint" id="hintText">就 5 分钟，到了可以停</div>
    </div>
    <div class="active-controls">
      <button class="btn-ghost" id="resetTimerBtn">↺ 重新计时</button>
    </div>
  </div>

  <!-- ===== DONE ===== -->
  <div id="done-screen" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;">
      <div class="done-icon">✨</div>
      <div class="done-title">不错，完成了</div>
      <div class="done-action-name" id="doneActionName">读一页书</div>
    </div>
    <div class="done-buttons">
      <button class="btn-primary" id="continueBtn">再来一轮</button>
      <button class="btn-secondary" id="switchBtn">换一个</button>
    </div>
  </div>

  <!-- ===== SETTINGS MODAL ===== -->
  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">管理行动</div>
        <button class="modal-close" id="settingsClose">✕</button>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">筛选</div>
      <div class="scene-toggle-group" id="filterToggleGroup">
        <button class="toggle-btn active" data-scene="work" id="filterWorkBtn">🏢 在公司</button>
        <button class="toggle-btn active" data-scene="home" id="filterHomeBtn">🏠 在家</button>
      </div>
      <div id="actionList" style="margin-top:8px;"></div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;">添加新行动</div>
        <div class="add-form">
          <input type="text" id="newActionInput" placeholder="行动名称…" maxlength="30">
          <button id="addActionBtn">添加</button>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:10px;margin-bottom:4px;">应用于</div>
        <div class="scene-toggle-group" id="addSceneGroup">
          <button class="toggle-btn active" data-scene="work">🏢 在公司</button>
          <button class="toggle-btn active" data-scene="home">🏠 在家</button>
        </div>
        <div class="duration-picker">
          <span class="duration-label">时长</span>
          <div class="duration-options">
            <button class="dur-btn" data-sec="30">30 秒</button>
            <button class="dur-btn" data-sec="60">1 分</button>
            <button class="dur-btn" data-sec="120">2 分</button>
            <button class="dur-btn" data-sec="180">3 分</button>
            <button class="dur-btn active" data-sec="300">5 分</button>
            <button class="dur-btn" data-sec="600">10 分</button>
          </div>
        </div>
        <div class="prep-toggle" style="margin-top:12px;">
          <label class="toggle-row">
            <span class="toggle-row-label">准备步骤</span>
            <label class="switch">
              <input type="checkbox" id="prepCheckbox">
              <span class="switch-slider"></span>
            </label>
          </label>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;">开启后先显示准备页，准备好了再计时</div>
        </div>
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:10px;">
        <button class="btn-ghost" id="exportBtn" style="flex:1;text-align:center;">📤 导出数据</button>
        <button class="btn-ghost" id="importBtn" style="flex:1;text-align:center;">📥 导入数据</button>
      </div>
    </div>
  </div>

  <!-- ===== IMPORT OVERLAY ===== -->
  <div class="overlay" id="importOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">导入数据</div>
        <button class="modal-close" id="importClose">✕</button>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px;">粘贴 JSON 数据，或选择文件导入</div>
      <textarea id="importTextarea" style="width:100%;height:140px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:monospace;background:var(--bg);color:var(--text);resize:none;outline:none;" placeholder='[{"name":"读一页书","duration":300,...}]'></textarea>
      <input type="file" id="importFileInput" accept=".json" style="display:none">
      <button class="btn-ghost" id="importFileBtn" style="margin-top:8px;text-align:center;width:100%;">📁 选择文件</button>
      <button class="btn-primary" id="importConfirmBtn" style="margin-top:12px;">导入并替换当前数据</button>
    </div>
  </div>

  <!-- ===== EXPORT MENU ===== -->
  <div id="exportMenu" style="display:none;position:fixed;bottom:0;left:0;right:0;max-width:440px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;padding:16px;z-index:300;box-shadow:0 -4px 24px rgba(0,0,0,.15);animation:fadeIn .2s ease;">
    <div style="font-size:14px;font-weight:600;color:var(--text2);text-align:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);">导出方式</div>
    <button class="export-opt" data-method="share" style="display:block;width:100%;padding:14px;border:none;border-radius:12px;background:transparent;color:var(--text);font-size:16px;cursor:pointer;text-align:center;">📤 分享（AirDrop）</button>
    <button class="export-opt" data-method="file" style="display:block;width:100%;padding:14px;border:none;border-radius:12px;background:transparent;color:var(--text);font-size:16px;cursor:pointer;text-align:center;">💾 下载文件</button>
    <button class="export-opt" data-method="clipboard" style="display:block;width:100%;padding:14px;border:none;border-radius:12px;background:transparent;color:var(--text);font-size:16px;cursor:pointer;text-align:center;">📋 复制到剪贴板</button>
    <button id="exportMenuCancel" style="display:block;width:100%;padding:14px;margin-top:8px;border:none;border-radius:12px;background:transparent;color:var(--text2);font-size:16px;cursor:pointer;text-align:center;">取消</button>
  </div>
  <div id="exportOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:299;" onclick="document.getElementById('exportOverlay').style.display='none';document.getElementById('exportMenu').style.display='none';"></div>

  <!-- ===== TOAST ===== -->
  <div id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 24px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.15);opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;"></div>

  <!-- ===== FOOTER ===== -->
  <div class="footer"><span style="font-size:12px;color:var(--text2);opacity:.4;">自我探索 v1.5</span> · <a href="#" id="clearData" style="font-size:12px;">重置</a></div>
</div>

<script>
// ============================================================
//  Data
// ============================================================
const STORAGE_KEY = 'selfx_actions';
const DEFAULT_ACTIONS = [
  { name: '读一页书', duration: 300, scenes: ['work','home'] },
  { name: '背 3 个单词', duration: 180, scenes: ['work','home'] },
  { name: '看一篇英文短文', duration: 300, scenes: ['work','home'] },
  { name: '深呼吸 1 分钟', duration: 60, scenes: ['work','home'] },
  { name: '喝一杯水', duration: 60, scenes: ['work','home'] },
  { name: '写一条想法', duration: 180, scenes: ['work','home'] },
  { name: '站起来走走', duration: 180, scenes: ['work'] },
  { name: '伸个懒腰', duration: 60, scenes: ['work','home'] },
  { name: '整理桌面', duration: 300, scenes: ['work'] },
  { name: '扭扭脖子转转肩', duration: 120, scenes: ['work','home'] },
  { name: '做 5 个俯卧撑', duration: 120, prep: true, scenes: ['home'] },
  { name: '平板支撑 30 秒', duration: 30, prep: true, scenes: ['home'] },
  { name: '研究点有意思的', duration: 300, scenes: ['work','home'] },
  { name: '看一段技术文档', duration: 300, scenes: ['work','home'] },
  { name: '玩 5 分钟游戏', duration: 300, prep: true, scenes: ['home'] },
  { name: '冥想 3 分钟', duration: 180, prep: true, scenes: ['home'] },
  { name: '看看窗外', duration: 120, scenes: ['work','home'] },
];

function loadActions(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function saveActions(actions){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(actions));
}

let actions = loadActions() || DEFAULT_ACTIONS;

// Migrate old data: ensure every action has duration and prep fields
if(loadActions()){
  let changed = false;
  actions = actions.map(a => {
    let b = a;
    if(!b.duration){ changed = true; b = { ...b, duration: 300 }; }
    if(b.prep === undefined){ changed = true; b = { ...b, prep: false }; }
    return b;
  });
  if(changed) saveActions(actions);
}
let currentAction = null;
let timerInterval = null;
let timerEndAt = 0;
let totalSeconds = 0;
let rollFiltered = null;
let rollIndex = 0;
let rollLandTimer = null;

// ============================================================
//  Scene detection
// ============================================================
function getScene(){
  const now = new Date();
  const h = now.getHours();
  const day = now.getDay();
  const isWeekday = day >= 1 && day <= 5;
  const isWorkHour = h >= 9 && h <= 18;
  return (isWeekday && isWorkHour) ? 'work' : 'home';
}
function getGreeting(){
  const h = (new Date()).getHours();
  if(h<12)return '早上好';
  if(h<14)return '中午好';
  if(h<18)return '下午好';
  if(h<22)return '晚上好';
  return '夜深了';
}
function getSceneLabel(scene){
  return scene === 'work' ? '🏢 在公司' : '🏠 在家';
}
function getFilteredActions(scene){
  return actions.filter(a => a.scenes.includes(scene));
}

// ============================================================
//  UI: IDLE
// ============================================================
function renderIdle(){
  // Clean up any running roll state
  if(rollTimer){ clearInterval(rollTimer); rollTimer = null; }
  if(rollLandTimer){ clearTimeout(rollLandTimer); rollLandTimer = null; }
  rollFiltered = null;
  document.getElementById('rollHint').style.opacity = '0';

  const scene = getScene();
  const filtered = getFilteredActions(scene);
  document.getElementById('idle-screen').classList.add('active');
  document.getElementById('rolling-screen').classList.remove('active');
  document.getElementById('prep-screen').classList.remove('active');
  document.getElementById('active-screen').classList.remove('active');
  document.getElementById('done-screen').classList.remove('active');
  document.getElementById('greeting').textContent = getGreeting();
  document.getElementById('sceneBadge').textContent =
    `${getSceneLabel(scene)} · ${filtered.length} 个行动`;
  document.getElementById('actionCount').textContent = filtered.length;
}

// ============================================================
//  UI: ROLL -> ACTIVE
// ============================================================
function pickRandom(scene){
  const filtered = getFilteredActions(scene);
  if(filtered.length === 0){
    alert('当前场景没有可用行动，去管理页面添加一些吧！');
    renderIdle();
    return null;
  }
  return filtered[Math.floor(Math.random() * filtered.length)];
}

let rollTimer = null;
function startRoll(){
  const scene = getScene();
  const filtered = getFilteredActions(scene);
  if(filtered.length === 0){
    alert('当前场景没有可用行动，去管理页面添加一些吧！');
    renderIdle();
    return;
  }
  rollFiltered = filtered;

  document.getElementById('idle-screen').classList.remove('active');
  document.getElementById('rolling-screen').classList.add('active');
  document.getElementById('prep-screen').classList.remove('active');
  document.getElementById('active-screen').classList.remove('active');
  document.getElementById('done-screen').classList.remove('active');

  const roller = document.getElementById('actionRoller');
  roller.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'item';
  el.style.animation = 'none';
  el.textContent = filtered[0].name;
  roller.appendChild(el);

  // Show tap hint
  const hint = document.getElementById('rollHint');
  hint.style.opacity = '0';
  setTimeout(() => { hint.style.opacity = '.6'; }, 500);

  let i = 0;
  if(rollTimer) clearInterval(rollTimer);
  rollTimer = setInterval(() => {
    el.textContent = filtered[i % filtered.length].name;
    rollIndex = i;
    i++;
  }, 60);

  // After ~1.8s, auto-land
  if(rollLandTimer) clearTimeout(rollLandTimer);
  rollLandTimer = setTimeout(() => {
    clearInterval(rollTimer);
    rollTimer = null;
    rollLandTimer = null;
    hint.style.opacity = '0';
    const chosen = filtered[Math.floor(Math.random() * filtered.length)];
    el.textContent = chosen.name;
    el.style.animation = 'none';
    setTimeout(() => {
      startAction(chosen);
    }, 400);
  }, 1800);
}

function startAction(action){
  currentAction = action;
  if(action.prep){
    showPrep();
  } else {
    startTimer();
  }
}

// ============================================================
//  Prep
// ============================================================
function showPrep(){
  if(!currentAction) { renderIdle(); return; }
  document.getElementById('idle-screen').classList.remove('active');
  document.getElementById('rolling-screen').classList.remove('active');
  document.getElementById('prep-screen').classList.add('active');
  document.getElementById('active-screen').classList.remove('active');
  document.getElementById('done-screen').classList.remove('active');
  document.getElementById('prepActionName').textContent = currentAction.name;
  document.getElementById('prepDuration').textContent = `共 ${formatDuration(currentAction.duration)}`;
}

document.getElementById('prepStartBtn').addEventListener('click', () => {
  startTimer();
});

document.getElementById('prepCancelBtn').addEventListener('click', () => {
  const scene = getScene();
  const chosen = pickRandom(scene);
  if(chosen) startAction(chosen);
});

// ============================================================
//  Timer
// ============================================================
function formatDuration(sec){
  if(sec < 60) return sec + ' 秒';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return s > 0 ? `${m} 分 ${s} 秒` : `${m} 分钟`;
}
function formatDurationShort(sec){
  if(sec < 60) return sec + '秒';
  return Math.floor(sec / 60) + '分钟';
}

function startTimer(){
  if(!currentAction) return;
  totalSeconds = currentAction.duration;
  timerEndAt = Date.now() + totalSeconds * 1000;

  document.getElementById('idle-screen').classList.remove('active');
  document.getElementById('rolling-screen').classList.remove('active');
  document.getElementById('prep-screen').classList.remove('active');
  document.getElementById('active-screen').classList.add('active');
  document.getElementById('done-screen').classList.remove('active');

  document.getElementById('activeActionLabel').textContent = currentAction.name;
  document.getElementById('hintText').textContent = `就 ${formatDuration(totalSeconds)}，到了可以停`;
  document.getElementById('timerUnit').textContent = `共 ${formatDuration(totalSeconds)}`;
  clearTimer();
  tick();
  timerInterval = setInterval(tick, 200);
}

function tick(){
  const remaining = Math.max(0, timerEndAt - Date.now());
  const secLeft = Math.ceil(remaining / 1000);
  const m = Math.floor(secLeft / 60);
  const s = secLeft % 60;
  document.getElementById('timerDigits').textContent =
    `${m}:${s.toString().padStart(2,'0')}`;

  if(totalSeconds > 0){
    const pct = remaining / (totalSeconds * 1000);
    const deg = pct * 360;
    document.getElementById('timerRing').style.background =
      `conic-gradient(var(--accent) 0deg ${deg}deg, var(--border) ${deg}deg 360deg)`;
  }

  if(remaining <= 0){
    clearTimer();
    setTimeout(showDone, 300);
  }
}

function clearTimer(){
  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// ============================================================
//  Done
// ============================================================
function showDone(){
  document.getElementById('idle-screen').classList.remove('active');
  document.getElementById('rolling-screen').classList.remove('active');
  document.getElementById('prep-screen').classList.remove('active');
  document.getElementById('active-screen').classList.remove('active');
  document.getElementById('done-screen').classList.add('active');
  if(currentAction){
    document.getElementById('doneActionName').textContent = currentAction.name;
  }
}

// ============================================================
//  Events
// ============================================================
// Start
document.getElementById('startBtn').addEventListener('click', startRoll);

// Rolling screen: tap to stop and start current action
document.getElementById('rolling-screen').addEventListener('click', () => {
  if(!document.getElementById('rolling-screen').classList.contains('active')) return;
  if(!rollTimer) return;
  clearInterval(rollTimer);
  rollTimer = null;
  if(rollLandTimer){
    clearTimeout(rollLandTimer);
    rollLandTimer = null;
  }
  if(!rollFiltered || rollFiltered.length === 0) return;
  const el = document.querySelector('#actionRoller .item');
  const chosen = rollFiltered[rollIndex % rollFiltered.length];
  el.textContent = chosen.name;
  el.style.animation = 'none';
  document.getElementById('rollHint').style.opacity = '0';
  setTimeout(() => startAction(chosen), 300);
});

// Exit active
document.getElementById('exitActiveBtn').addEventListener('click', () => {
  clearTimer();
  renderIdle();
});

// Reset timer
document.getElementById('resetTimerBtn').addEventListener('click', () => {
  if(currentAction) startTimer();
});

// Continue (再来5分钟)
document.getElementById('continueBtn').addEventListener('click', () => {
  if(currentAction) startTimer();
});

// Switch (换一个)
document.getElementById('switchBtn').addEventListener('click', () => {
  const scene = getScene();
  const chosen = pickRandom(scene);
  if(chosen) startAction(chosen);
});

// ============================================================
//  Settings modal
// ============================================================
function getFilterScenes(){
  const scenes = [];
  if(document.getElementById('filterWorkBtn').classList.contains('active')) scenes.push('work');
  if(document.getElementById('filterHomeBtn').classList.contains('active')) scenes.push('home');
  return scenes;
}

function renderActionList(){
  const container = document.getElementById('actionList');
  const filterScenes = getFilterScenes();
  container.innerHTML = '';
  actions.forEach((a, idx) => {
    // Skip if action doesn't match any active filter
    if(!a.scenes.some(s => filterScenes.includes(s))) return;
    const div = document.createElement('div');
    div.className = 'action-item';
    div.innerHTML = `
      <div>
        <div class="action-item-name">${escapeHtml(a.name)}</div>
        <div class="action-item-tags">
          <span class="tag">${formatDurationShort(a.duration)}</span>
          ${a.prep ? '<span class="tag prep-tag">准备</span>' : ''}
          ${a.scenes.includes('work') ? '<span class="tag">公司</span>' : ''}
          ${a.scenes.includes('home') ? '<span class="tag">在家</span>' : ''}
        </div>
      </div>
      <button class="action-item-del" data-idx="${idx}">✕</button>
    `;
    container.appendChild(div);
  });
  // Delete handlers
  container.querySelectorAll('.action-item-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      actions.splice(idx, 1);
      saveActions(actions);
      renderActionList();
      updateSceneToggleButtons();
    });
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateSceneToggleButtons(){
  const scene = getScene();
  const count = getFilteredActions(scene).length;
  document.getElementById('sceneBadge').textContent =
    `${getSceneLabel(scene)} · ${count} 个行动`;
}

document.getElementById('settingsBtn').addEventListener('click', () => {
  renderActionList();
  document.getElementById('settingsOverlay').classList.add('open');
});

document.getElementById('settingsClose').addEventListener('click', () => {
  document.getElementById('settingsOverlay').classList.remove('open');
});

document.getElementById('settingsOverlay').addEventListener('click', (e) => {
  if(e.target === e.currentTarget){
    document.getElementById('settingsOverlay').classList.remove('open');
  }
});

// Add action
document.getElementById('addActionBtn').addEventListener('click', addNewAction);
document.getElementById('newActionInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addNewAction();
});

function addNewAction(){
  const input = document.getElementById('newActionInput');
  const name = input.value.trim();
  if(!name) return;
  const scenes = [];
  document.querySelectorAll('#addSceneGroup .toggle-btn.active').forEach(btn => {
    scenes.push(btn.dataset.scene);
  });
  if(scenes.length === 0) scenes.push('home');

  if(actions.some(a => a.name === name)){
    alert('这个行动已经有了');
    return;
  }

  const durBtn = document.querySelector('.dur-btn.active');
  const duration = durBtn ? parseInt(durBtn.dataset.sec) : 300;
  const prep = document.getElementById('prepCheckbox').checked;

  actions.push({ name, duration, prep, scenes });
  saveActions(actions);
  input.value = '';
  renderActionList();
  updateSceneToggleButtons();
}

// Filter toggles in settings
document.querySelectorAll('#filterToggleGroup .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    // Don't allow both to be unchecked
    const active = document.querySelectorAll('#filterToggleGroup .toggle-btn.active');
    if(active.length === 0) btn.classList.add('active');
    renderActionList();
  });
});

// Add-form scene toggles
document.querySelectorAll('#addSceneGroup .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const active = document.querySelectorAll('#addSceneGroup .toggle-btn.active');
    if(active.length === 0) btn.classList.add('active');
  });
});

// Duration picker
document.querySelectorAll('.dur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Clear data
document.getElementById('clearData').addEventListener('click', (e) => {
  e.preventDefault();
  if(confirm('清除所有自定义行动，恢复默认？')){
    localStorage.removeItem(STORAGE_KEY);
    actions = DEFAULT_ACTIONS.slice();
    renderIdle();
  }
});

// ============================================================
//  Export / Import
// ============================================================
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

function doExport(method){
  const data = JSON.stringify(actions, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  if(method === 'share'){
    const file = new File([blob], `自我探索-${new Date().toISOString().slice(0, 10)}.json`, { type: 'application/json' });
    if(navigator.canShare && navigator.canShare({ files: [file] })){
      navigator.share({ files: [file], title: '自我探索数据' }).catch(() => {});
    }else{
      showToast('当前设备不支持分享');
    }
  }else if(method === 'file'){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `自我探索-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast('数据已导出');
  }else if(method === 'clipboard'){
    navigator.clipboard.writeText(data).then(() => showToast('已复制到剪贴板')).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = data; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      showToast('已复制到剪贴板');
    });
  }
}
document.getElementById('exportBtn').addEventListener('click', () => {
  document.getElementById('exportOverlay').style.display = 'block';
  document.getElementById('exportMenu').style.display = 'block';
});
document.querySelectorAll('.export-opt[data-method]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('exportOverlay').style.display = 'none';
    document.getElementById('exportMenu').style.display = 'none';
    doExport(btn.dataset.method);
  });
});
document.getElementById('exportMenuCancel').addEventListener('click', () => {
  document.getElementById('exportOverlay').style.display = 'none';
  document.getElementById('exportMenu').style.display = 'none';
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importOverlay').classList.add('open');
  document.getElementById('importTextarea').value = '';
  document.getElementById('importTextarea').focus();
});

document.getElementById('importClose').addEventListener('click', () => {
  document.getElementById('importOverlay').classList.remove('open');
});

document.getElementById('importOverlay').addEventListener('click', (e) => {
  if(e.target === e.currentTarget){
    document.getElementById('importOverlay').classList.remove('open');
  }
});

document.getElementById('importConfirmBtn').addEventListener('click', () => {
  const raw = document.getElementById('importTextarea').value.trim();
  if(!raw){ showToast('请先粘贴数据'); return; }
  try{
    const imported = JSON.parse(raw);
    if(!Array.isArray(imported) || imported.length === 0){
      showToast('数据格式不对，请检查');
      return;
    }
    // Validate structure
    for(const a of imported){
      if(!a.name || !a.duration || !a.scenes){
        showToast('数据格式不完整，请检查');
        return;
      }
    }
    actions = imported;
    saveActions(actions);
    document.getElementById('importOverlay').classList.remove('open');
    renderActionList();
    updateSceneToggleButtons();
    renderIdle();
    showToast(`已导入 ${actions.length} 个行动`);
  }catch(e){
    showToast('JSON 解析失败，请检查格式');
  }
});

// 文件导入
document.getElementById('importFileBtn').addEventListener('click', () => {
  document.getElementById('importFileInput').click();
});
document.getElementById('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const imported = JSON.parse(ev.target.result);
      if(!Array.isArray(imported) || imported.length === 0){
        showToast('数据格式不对，请检查');
        return;
      }
      for(const a of imported){
        if(!a.name || !a.duration || !a.scenes){
          showToast('数据格式不完整，请检查');
          return;
        }
      }
      actions = imported;
      saveActions(actions);
      document.getElementById('importOverlay').classList.remove('open');
      renderActionList();
      updateSceneToggleButtons();
      renderIdle();
      showToast(`已导入 ${actions.length} 个行动`);
    }catch(e){
      showToast('JSON 解析失败，请检查格式');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ============================================================
//  Init
// ============================================================
renderIdle();

// Hotkey: Space to start
document.addEventListener('keydown', (e) => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === ' '){
    e.preventDefault();
    if(document.getElementById('idle-screen').classList.contains('active')){
      document.getElementById('startBtn').click();
    } else if(document.getElementById('prep-screen').classList.contains('active')){
      document.getElementById('prepStartBtn').click();
    } else if(document.getElementById('done-screen').classList.contains('active')){
      document.getElementById('continueBtn').click();
    }
  }
  // Escape to close settings or go back
  if(e.key === 'Escape'){
    if(document.getElementById('settingsOverlay').classList.contains('open')){
      document.getElementById('settingsClose').click();
    } else if(document.getElementById('active-screen').classList.contains('active')){
      document.getElementById('exitActiveBtn').click();
    }
  }
});
</script>
